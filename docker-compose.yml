
version: '3.8'

services:
  caserita-smart:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caserita-smart
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - caserita_network

networks:
  caserita_network:
    driver: bridge
